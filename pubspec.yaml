name: kavkaz_service
description: Kavkaz Service -  приложение для водителей
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0 
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.8
  image: ^4.0.15

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"  # Путь правильный
  min_sdk_android: 21
  adaptive_icon_background: "#1A1A1A"
  adaptive_icon_foreground: "assets/icons/logo.png"
  background_color: "#1A1A1A"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#F9C40D"
  image: assets/icons/logo.png
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/